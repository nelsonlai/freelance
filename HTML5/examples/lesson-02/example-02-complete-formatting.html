<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>文字格式化完整範例</title>
</head>
<body>
    <h1>產品介紹</h1>
    
    <h2>全新智慧手機</h2>
    
    <p><strong>重要公告：</strong>限時優惠活動開跑！</p>
    
    <p>
        原價 <del>$15,000</del> 
        <mark>現在只要 <strong>$12,000</strong></mark>
    </p>
    
    <h3>產品特色</h3>
    <p>
        採用最新的 <abbr title="人工智慧">AI</abbr> 技術，
        搭載 8GB <abbr title="Random Access Memory">RAM</abbr>。
    </p>
    
    <h3>技術規格</h3>
    <p>
        電池容量：5000mAh<br>
        螢幕尺寸：6.5"<br>
        重量：180g
    </p>
    
    <h3>顧客評價</h3>
    <blockquote>
        <p>這是我用過<em>最棒</em>的手機！效能超級好！</p>
        <footer>— 王小華</footer>
    </blockquote>
    
    <p><small>&copy; 2026 科技公司版權所有。</small></p>
</body>
</html>
