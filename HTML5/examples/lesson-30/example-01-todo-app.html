<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待辦事項應用 - 整合實戰專題</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft JhengHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: bold;
        }
        
        .input-section {
            padding: 30px;
            background: #f9f9f9;
            border-bottom: 1px solid #eee;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        #todo-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        
        #todo-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        #add-btn {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        #add-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .todo-list {
            padding: 20px 30px;
            min-height: 200px;
        }
        
        .todo-item {
            background: white;
            border: 2px solid #eee;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }
        
        .todo-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateX(5px);
        }
        
        .todo-item.completed {
            opacity: 0.6;
            background: #f5f5f5;
        }
        
        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }
        
        .todo-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }
        
        .todo-text {
            flex: 1;
            font-size: 16px;
            color: #333;
        }
        
        .todo-date {
            font-size: 12px;
            color: #999;
        }
        
        .delete-btn {
            background: #FF6B6B;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .delete-btn:hover {
            background: #ff5252;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
        }
        
        .actions {
            padding: 20px 30px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .clear-completed {
            background: #FF6B6B;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .clear-completed:hover {
            background: #ff5252;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✅ 待辦事項</h1>
            <p>整合 HTML + CSS + JavaScript 的完整應用</p>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="total-count">0</div>
                    <div>總計</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="active-count">0</div>
                    <div>進行中</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="completed-count">0</div>
                    <div>已完成</div>
                </div>
            </div>
        </header>
        
        <div class="input-section">
            <div class="input-group">
                <input type="text" 
                       id="todo-input" 
                       placeholder="輸入新的待辦事項..."
                       onkeypress="if(event.key==='Enter') addTodo()">
                <button id="add-btn" onclick="addTodo()">新增</button>
            </div>
        </div>
        
        <div class="todo-list" id="todo-list">
            <div class="empty-state">
                <p>📝 還沒有待辦事項</p>
                <p>立即新增一個吧！</p>
            </div>
        </div>
        
        <div class="actions">
            <span id="items-left">0 個待辦事項</span>
            <button class="clear-completed" onclick="clearCompleted()">
                清除已完成
            </button>
        </div>
    </div>
    
    <script>
        // 從 localStorage 載入待辦事項
        let todos = JSON.parse(localStorage.getItem('todos') || '[]');
        
        // 儲存到 localStorage
        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
            updateStats();
        }
        
        // 新增待辦事項
        function addTodo() {
            let input = document.getElementById('todo-input');
            let text = input.value.trim();
            
            if (text === '') {
                alert('請輸入待辦事項！');
                return;
            }
            
            let todo = {
                id: Date.now(),
                text: text,
                completed: false,
                date: new Date().toLocaleString('zh-TW')
            };
            
            todos.push(todo);
            saveTodos();
            renderTodos();
            
            input.value = '';
            input.focus();
            
            console.log('新增待辦事項：', text);
        }
        
        // 切換完成狀態
        function toggleTodo(id) {
            let todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos();
                renderTodos();
                console.log('切換狀態：', todo.text, todo.completed);
            }
        }
        
        // 刪除待辦事項
        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            saveTodos();
            renderTodos();
            console.log('刪除待辦事項 ID：', id);
        }
        
        // 清除已完成
        function clearCompleted() {
            let completedCount = todos.filter(t => t.completed).length;
            
            if (completedCount === 0) {
                alert('沒有已完成的事項！');
                return;
            }
            
            if (confirm(`確定要清除 ${completedCount} 個已完成的事項嗎？`)) {
                todos = todos.filter(t => !t.completed);
                saveTodos();
                renderTodos();
                console.log('已清除完成的事項');
            }
        }
        
        // 渲染待辦事項列表
        function renderTodos() {
            let todoList = document.getElementById('todo-list');
            
            if (todos.length === 0) {
                todoList.innerHTML = `
                    <div class="empty-state">
                        <p>📝 還沒有待辦事項</p>
                        <p>立即新增一個吧！</p>
                    </div>
                `;
                return;
            }
            
            todoList.innerHTML = '';
            
            todos.forEach(todo => {
                let item = document.createElement('div');
                item.className = 'todo-item' + (todo.completed ? ' completed' : '');
                item.innerHTML = `
                    <input type="checkbox" 
                           class="todo-checkbox" 
                           ${todo.completed ? 'checked' : ''}
                           onchange="toggleTodo(${todo.id})">
                    <div class="todo-text">${todo.text}</div>
                    <div class="todo-date">${todo.date}</div>
                    <button class="delete-btn" onclick="deleteTodo(${todo.id})">刪除</button>
                `;
                todoList.appendChild(item);
            });
        }
        
        // 更新統計
        function updateStats() {
            let total = todos.length;
            let completed = todos.filter(t => t.completed).length;
            let active = total - completed;
            
            document.getElementById('total-count').textContent = total;
            document.getElementById('active-count').textContent = active;
            document.getElementById('completed-count').textContent = completed;
            document.getElementById('items-left').textContent = `${active} 個待辦事項`;
        }
        
        // 初始化
        window.addEventListener('load', function() {
            renderTodos();
            updateStats();
            console.log('=== 待辦事項應用已載入 ===');
            console.log('目前有', todos.length, '個待辦事項');
        });
    </script>
</body>
</html>
