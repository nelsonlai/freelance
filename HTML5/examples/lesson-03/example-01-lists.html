<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>列表範例</title>
</head>
<body>
    <h1>列表示範</h1>
    
    <h2>無序列表</h2>
    <h3>我的興趣</h3>
    <ul>
        <li>閱讀</li>
        <li>旅行</li>
        <li>攝影</li>
        <li>程式設計</li>
    </ul>
    
    <h2>有序列表</h2>
    <h3>煮飯步驟</h3>
    <ol>
        <li>洗米</li>
        <li>加水</li>
        <li>放入電鍋</li>
        <li>按下開關</li>
        <li>等待煮熟</li>
    </ol>
    
    <h2>定義列表</h2>
    <h3>HTML 術語解釋</h3>
    <dl>
        <dt>HTML</dt>
        <dd>超文本標記語言，用於建立網頁結構。</dd>
        
        <dt>CSS</dt>
        <dd>層疊樣式表，用於設定網頁的外觀和版面。</dd>
        
        <dt>JavaScript</dt>
        <dd>程式語言，用於實現網頁的互動功能。</dd>
    </dl>
</body>
</html>
